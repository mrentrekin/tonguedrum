<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tongue Drum</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0a;font-family:sans-serif;}
#app{width:100%;max-width:480px;margin:0 auto;background:#0a0a0a;display:flex;flex-direction:column;min-height:100vh;}

#start-screen{
  position:fixed;inset:0;background:#0a0a0a;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:100;
  transition:opacity 0.3s ease;
}
#start-screen.hidden{opacity:0;pointer-events:none;}
#start-title{font-size:12px;color:#666;letter-spacing:4px;text-transform:uppercase;margin-bottom:40px;}
#start-btn{
  width:90px;height:90px;border-radius:50%;
  border:1px solid #555;background:#1a1a1a;
  display:flex;align-items:center;justify-content:center;
  font-size:30px;color:#aaa;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
#start-hint{margin-top:24px;font-size:11px;color:#444;letter-spacing:2px;text-transform:uppercase;}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;border-bottom:0.5px solid #222;}
.top-title{font-size:11px;color:#666;letter-spacing:3px;text-transform:uppercase;}
.vol-row{display:flex;align-items:center;gap:8px;}
.vol-row label{font-size:10px;color:#444;letter-spacing:1.5px;text-transform:uppercase;}
.vol-row input[type=range]{width:72px;-webkit-appearance:none;appearance:none;height:2px;background:#333;border-radius:1px;outline:none;border:none;}
.vol-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#aaa;cursor:pointer;}
.vol-pct{font-size:10px;color:#444;min-width:28px;}

.scale-row{display:flex;border-bottom:0.5px solid #222;}
.sc-btn{flex:1;padding:11px 0;background:#0a0a0a;border:none;border-right:0.5px solid #222;font-size:11px;color:#444;letter-spacing:1px;cursor:pointer;transition:all 0.15s;}
.sc-btn:last-child{border-right:none;}
.sc-btn.active{color:#ddd;background:#181818;}

.drum-wrap{display:flex;align-items:center;justify-content:center;padding:20px 0;position:relative;flex-shrink:0;}
#tongue-container{position:relative;}

.tongue-btn{position:absolute;cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;}
.tongue-pill{width:100%;height:100%;background:linear-gradient(180deg,#2a2a2a 0%,#1c1c1c 100%);border:1px solid #404040;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background 0.08s,border-color 0.08s,transform 0.08s;position:relative;overflow:hidden;}
.tongue-pill::after{content:'';position:absolute;top:8%;left:20%;width:60%;height:35%;border-radius:50%;background:rgba(255,255,255,0.06);}
.tongue-btn.hit .tongue-pill{background:linear-gradient(180deg,#484848 0%,#333 100%);border-color:#777;transform:scale(0.93);}
.t-label{font-size:10px;color:#888;font-weight:500;letter-spacing:0.5px;position:relative;z-index:1;}
.tongue-btn.hit .t-label{color:#eee;}

.drum-center{position:absolute;border-radius:50%;background:#111;border:1px solid #2a2a2a;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:5;}
.drum-center span{font-size:7px;color:#333;letter-spacing:2px;text-transform:uppercase;line-height:2;}

.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.06);animation:rip 0.6s ease-out forwards;pointer-events:none;transform:translate(-50%,-50%);}
@keyframes rip{from{width:0;height:0;opacity:1;}to{width:160px;height:160px;opacity:0;}}

.bottom-section{border-top:0.5px solid #222;padding:14px 20px 20px;}
.rec-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.rec-btn{width:40px;height:40px;border-radius:50%;background:#161616;border:1px solid #2e2e2e;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#666;flex-shrink:0;transition:all 0.15s;}
.rec-btn.recording{border-color:#a00;color:#e44;}
.rec-indicator{display:flex;align-items:center;gap:8px;flex:1;}
.rec-dot{width:7px;height:7px;border-radius:50%;background:#c00;opacity:0;}
.rec-dot.on{opacity:1;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.1;}}
.rec-time{font-size:12px;color:#444;letter-spacing:1px;}

.panel-label{font-size:10px;color:#333;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;}
.rec-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border:0.5px solid #222;border-radius:8px;margin-bottom:6px;cursor:pointer;background:#111;transition:background 0.1s,border-color 0.1s;}
.rec-item.playing{border-color:#555;}
.ri-icon{font-size:14px;color:#444;}
.rec-item.playing .ri-icon{color:#ccc;}
.ri-name{flex:1;font-size:11px;color:#444;}
.rec-item.playing .ri-name{color:#ccc;}
.ri-dur{font-size:10px;color:#2d2d2d;margin-right:4px;}
.ri-del{font-size:14px;color:#2d2d2d;cursor:pointer;padding:2px 6px;}
.ri-del:hover{color:#c00;}
.no-recs{font-size:11px;color:#2d2d2d;text-align:center;padding:14px 0;letter-spacing:0.5px;}
</style>
</head>
<body>

<div id="start-screen">
  <p id="start-title">Tongue Drum</p>
  <div id="start-btn">&#9654;</div>
  <p id="start-hint">tap to begin</p>
</div>

<div id="app">
  <div class="top-bar">
    <span class="top-title">Tongue Drum</span>
    <div class="vol-row">
      <label>Vol</label>
      <input type="range" min="0" max="1" step="0.01" value="0.7" id="vol-slider">
      <span class="vol-pct" id="vol-pct">70%</span>
    </div>
  </div>
  <div class="scale-row">
    <button class="sc-btn active" data-scale="pentatonic">Pentatonic</button>
    <button class="sc-btn" data-scale="diatonic">Major</button>
    <button class="sc-btn" data-scale="minor">Minor</button>
  </div>
  <div class="drum-wrap" id="drum-wrap">
    <div id="tongue-container"></div>
  </div>
  <div class="bottom-section">
    <div class="rec-row">
      <div class="rec-btn" id="rec-btn">&#9679;</div>
      <div class="rec-indicator">
        <div class="rec-dot" id="rec-dot"></div>
        <span class="rec-time" id="rec-time">ready</span>
      </div>
      <div class="rec-btn" id="stop-btn" style="display:none;">&#9632;</div>
    </div>
    <div class="panel-label">Recordings</div>
    <div class="no-recs" id="no-recs">No recordings yet</div>
    <div id="rec-list"></div>
  </div>
</div>

<script>
const AC = window.AudioContext || window.webkitAudioContext;
let ctx = null, masterGain = null, volume = 0.7;

function unlockAudio() {
  if (ctx) return;
  ctx = new AC();
  masterGain = ctx.createGain();
  masterGain.gain.value = volume;
  masterGain.connect(ctx.destination);
  const buf = ctx.createBuffer(1,1,22050);
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.connect(ctx.destination);
  src.start(0);
  if (ctx.state === 'suspended') ctx.resume();
}

function dismissStart() {
  unlockAudio();
  const s = document.getElementById('start-screen');
  s.classList.add('hidden');
  setTimeout(() => { s.style.display = 'none'; }, 350);
}

const startScreen = document.getElementById('start-screen');
const startBtn    = document.getElementById('start-btn');

startBtn.addEventListener('touchstart', function(e) {
  e.preventDefault();
  e.stopPropagation();
  dismissStart();
}, { passive: false });

startScreen.addEventListener('touchstart', function(e) {
  e.preventDefault();
  dismissStart();
}, { passive: false });

startScreen.addEventListener('click', function() {
  dismissStart();
});

const scales = {
  pentatonic: ['D4','F4','G4','A4','C5','D5','F5','G5'],
  diatonic:   ['C4','D4','E4','F4','G4','A4','B4','C5'],
  minor:      ['A3','C4','D4','E4','G4','A4','C5','D5'],
};
const freqs = {
  'A3':220,'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,
  'G4':392,'A4':440,'B4':493.88,'C5':523.25,'D5':587.33,'F5':698.46,'G5':783.99
};
let currentScale = 'pentatonic';
let recording=false, recStart=0, recEvents=[], recTimerInt=null;
let recordings=[], playingId=null, playTOs=[], recCount=0;

function strike(freq, el) {
  if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume();
  const now = ctx.currentTime;
  const o1=ctx.createOscillator(), o2=ctx.createOscillator();
  const g=ctx.createGain(), g2=ctx.createGain();
  o1.type='sine';     o1.frequency.value = freq;
  o2.type='triangle'; o2.frequency.value = freq * 2.756;
  g2.gain.setValueAtTime(0.12, now);
  g2.gain.exponentialRampToValueAtTime(0.001, now+0.4);
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.75, now+0.008);
  g.gain.exponentialRampToValueAtTime(0.3, now+0.3);
  g.gain.exponentialRampToValueAtTime(0.001, now+3.5);
  o1.connect(g); o2.connect(g2); g2.connect(g); g.connect(masterGain);
  o1.start(now); o2.start(now); o1.stop(now+4); o2.stop(now+4);

  if (el) {
    el.classList.add('hit');
    setTimeout(() => el.classList.remove('hit'), 160);
    const wrap = document.getElementById('drum-wrap');
    const wr=wrap.getBoundingClientRect(), er=el.getBoundingClientRect();
    const rip=document.createElement('div');
    rip.className='ripple';
    rip.style.left=(er.left-wr.left+er.width/2)+'px';
    rip.style.top =(er.top -wr.top +er.height/2)+'px';
    wrap.appendChild(rip);
    setTimeout(()=>rip.remove(),650);
  }
}

const tc = document.getElementById('tongue-container');

function buildTongues() {
  tc.querySelectorAll('.tongue-btn,.drum-center').forEach(e=>e.remove());
  const notes = scales[currentScale];
  const appW  = document.getElementById('app').offsetWidth || 390;
  const TW=44, TH=110;
  const rx = appW * 0.28;
  const ry = appW * 0.34;
  const CX = appW / 2;
  const CY = ry + TH * 0.5 + 10;
  const canvasW = appW;
  const canvasH = CY * 2;

  tc.style.width  = canvasW + 'px';
  tc.style.height = canvasH + 'px';

  const cR = 36;
  const disc = document.createElement('div');
  disc.className = 'drum-center';
  disc.style.cssText = `width:${cR*2}px;height:${cR*2}px;left:${CX-cR}px;top:${CY-cR}px;`;
  disc.innerHTML = '<span>tongue</span><span>drum</span>';
  tc.appendChild(disc);

  notes.forEach((note, i) => {
    const angle = (i / notes.length) * 2 * Math.PI - Math.PI / 2;
    const ox = CX + rx * Math.cos(angle);
    const oy = CY + ry * Math.sin(angle);
    const el = document.createElement('div');
    el.className = 'tongue-btn';
    el.style.cssText = `width:${TW}px;height:${TH}px;left:${ox-TW/2}px;top:${oy-TH/2}px;`;
    const deg = (angle * 180 / Math.PI) + 90;
    el.style.transform = `rotate(${deg}deg)`;
    const pill = document.createElement('div');
    pill.className = 'tongue-pill';
    const lbl = document.createElement('span');
    lbl.className = 't-label';
    lbl.textContent = note;
    lbl.style.transform = `rotate(${-deg}deg)`;
    pill.appendChild(lbl);
    el.appendChild(pill);
    const f = freqs[note];
    const fire = () => {
      strike(f, el);
      if (recording) recEvents.push({t: Date.now()-recStart, freq: f});
    };
    el.addEventListener('mousedown', fire);
    el.addEventListener('touchstart', e=>{e.preventDefault();fire();}, {passive:false});
    tc.appendChild(el);
  });
}

document.querySelectorAll('.sc-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sc-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentScale = btn.dataset.scale;
    buildTongues();
  });
});

document.getElementById('vol-slider').addEventListener('input', e => {
  volume = parseFloat(e.target.value);
  if (masterGain) masterGain.gain.value = volume;
  document.getElementById('vol-pct').textContent = Math.round(volume*100)+'%';
});

const recBtn    = document.getElementById('rec-btn');
const stopBtn   = document.getElementById('stop-btn');
const recDot    = document.getElementById('rec-dot');
const recTimeEl = document.getElementById('rec-time');

recBtn.addEventListener('click', () => {
  recording=true; recStart=Date.now(); recEvents=[];
  recDot.classList.add('on'); recBtn.classList.add('recording');
  recBtn.style.display='none'; stopBtn.style.display='flex';
  recTimeEl.textContent='0:00';
  recTimerInt = setInterval(()=>{
    const s=Math.floor((Date.now()-recStart)/1000);
    recTimeEl.textContent=Math.floor(s/60)+':'+(s%60).toString().padStart(2,'0');
  },500);
});

stopBtn.addEventListener('click', () => {
  if (!recording) return;
  recording=false; clearInterval(recTimerInt);
  recDot.classList.remove('on'); recBtn.classList.remove('recording');
  stopBtn.style.display='none'; recBtn.style.display='flex';
  const dur=Date.now()-recStart;
  const s=Math.floor(dur/1000);
  const durStr=Math.floor(s/60)+':'+(s%60).toString().padStart(2,'0');
  if (recEvents.length>0) {
    recordings.push({id:Date.now(),label:'Take '+(++recCount),events:[...recEvents],dur,durStr});
    recTimeEl.textContent='saved'; renderRecs();
  } else {
    recTimeEl.textContent='nothing recorded';
    setTimeout(()=>recTimeEl.textContent='ready',2000);
  }
});

function renderRecs() {
  document.getElementById('no-recs').style.display = recordings.length?'none':'block';
  const list=document.getElementById('rec-list');
  list.innerHTML='';
  recordings.forEach(rec=>{
    const isPlaying=playingId===rec.id;
    const item=document.createElement('div');
    item.className='rec-item'+(isPlaying?' playing':'');
    item.innerHTML=`<span class="ri-icon">${isPlaying?'&#9632;':'&#9654;'}</span><span class="ri-name">${rec.label}</span><span class="ri-dur">${rec.durStr}</span><span class="ri-del" data-id="${rec.id}">&#10005;</span>`;
    item.querySelector('.ri-del').addEventListener('click',e=>{
      e.stopPropagation();
      const id=parseInt(e.currentTarget.dataset.id);
      if(playingId===id)stopPlay();
      recordings=recordings.filter(r=>r.id!==id);
      renderRecs();
    });
    item.addEventListener('click',e=>{
      if(e.target.closest('.ri-del'))return;
      playingId===rec.id?stopPlay():playRec(rec);
    });
    list.appendChild(item);
  });
}

function stopPlay(){
  playTOs.forEach(t=>clearTimeout(t)); playTOs=[];
  playingId=null; renderRecs();
}

function playRec(rec){
  stopPlay();
  if(!rec.events.length)return;
  playingId=rec.id; renderRecs();
  rec.events.forEach(ev=>playTOs.push(setTimeout(()=>strike(ev.freq,null),ev.t)));
  playTOs.push(setTimeout(()=>{playingId=null;renderRecs();},rec.dur+300));
}

buildTongues();
window.addEventListener('resize', buildTongues);
</script>
</body>
</html>
